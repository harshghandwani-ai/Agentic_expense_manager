<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Agentic Expense Logger</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>
    <div class="app-container theme-light">
        <!-- Sidebar for Desktop -->
        <aside class="sidebar desktop-only" id="sidebar">
            <div class="sidebar-header">
                <h2><i class="fa-solid fa-wallet gradient-text"></i> PennyWise AI</h2>
                <button id="theme-toggle-desktop" class="icon-btn" title="Toggle Theme"><i class="fa-solid fa-moon"></i></button>
            </div>
            <div class="sidebar-content">
                <nav class="side-nav">
                    <button class="nav-item active" data-page="page-chat"><i class="fa-regular fa-message"></i> Chat</button>
                    <button class="nav-item" data-page="page-stats"><i class="fa-solid fa-chart-pie"></i> Stats</button>
                    <button class="nav-item" data-page="page-history"><i class="fa-solid fa-clock-rotate-left"></i> History</button>
                </nav>
            </div>
            <div class="sidebar-footer">
                <div class="user-profile">
                    <div class="avatar-sm">U</div>
                    <span>User</span>
                </div>
            </div>
        </aside>

        <!-- Main Content Area -->
        <main class="main-content">
            
            <!-- Chat Page -->
            <div id="page-chat" class="page-view active">
                <header class="chat-header mobile-only">
                    <h3 class="model-name"><i class="fa-solid fa-wallet gradient-text"></i> PennyWise AI</h3>
                    <button id="theme-toggle-mobile" class="icon-btn"><i class="fa-solid fa-moon"></i></button>
                </header>

                <div class="chat-messages" id="chat-messages">
                    <div class="welcome-container">
                        <div class="welcome-icon"><i class="fa-solid fa-money-bill-wave"></i></div>
                        <h1>How can I help you today?</h1>
                        <p>Log expenses or query your spending history.</p>
                    </div>
                </div>

                <div class="chat-input-wrapper">
                    <div class="chat-input-container">
                        <form id="chat-form" class="chat-form">
                            <button type="button" class="action-btn" id="attach-btn" title="Attach"><i class="fa-solid fa-plus"></i></button>
                            <input type="file" id="image-upload" accept="image/*" style="display: none;">
                            <textarea id="message-input" placeholder="Message PennyWise AI..." rows="1" autofocus></textarea>
                            <button type="submit" class="send-btn" id="send-btn" disabled><i class="fa-solid fa-arrow-up"></i></button>
                        </form>
                    </div>
                </div>
            </div>

            <!-- Stats Page -->
            <div id="page-stats" class="page-view">
                <header class="page-header">
                    <h3 class="model-name"><i class="fa-solid fa-wallet gradient-text"></i> PennyWise AI</h3>
                    <button class="icon-btn"><i class="fa-solid fa-gear"></i></button>
                </header>
                
                <div class="stats-scroll-content">
                    <div class="balance-card">
                        <div class="balance-title">Current Balance</div>
                        <div class="balance-amount" id="stats-total-balance">₹0.00</div>
                        <div class="balance-stats">
                            <div class="stat-box income">
                                <div class="stat-icon"><i class="fa-solid fa-arrow-trend-up"></i></div>
                                <div class="stat-details">
                                    <span>INCOME</span>
                                    <span class="stat-val" id="stats-income-val">₹0.00</span>
                                </div>
                            </div>
                            <div class="stat-box expenses">
                                <div class="stat-icon"><i class="fa-solid fa-arrow-trend-down"></i></div>
                                <div class="stat-details">
                                    <span>EXPENSES</span>
                                    <span class="stat-val" id="stats-expenses-val">₹0.00</span>
                                </div>
                            </div>
                        </div>
                    </div>

                    <div class="section-top-categories">
                        <div class="section-header">
                            <h3>Top Categories</h3>
                            <a href="#" class="details-link">Details <i class="fa-solid fa-chevron-right"></i></a>
                        </div>
                        <div class="categories-card" id="stats-categories-list">
                            <div style="text-align: center; color: var(--text-secondary); padding: 20px;">Loading categories...</div>
                        </div>
                    </div>

                    <div class="action-cards">
                        <div class="action-card">
                            <div class="action-icon text-warning"><i class="fa-solid fa-filter"></i></div>
                            <span>Set Budget</span>
                        </div>
                        <div class="action-card" id="btn-export-csv" style="cursor: pointer;">
                            <div class="action-icon text-primary"><i class="fa-regular fa-calendar"></i></div>
                            <span>Export CSV</span>
                        </div>
                    </div>
                </div>
            </div>
            
            <!-- History Page -->
            <div id="page-history" class="page-view">
                <header class="page-header">
                    <h3 class="model-name"><i class="fa-solid fa-wallet gradient-text"></i> PennyWise AI</h3>
                    <button class="icon-btn"><i class="fa-solid fa-gear"></i></button>
                </header>
                <div class="history-scroll-content">
                    <div class="section-header">
                        <h3>Recent Transactions</h3>
                        <button class="icon-btn" style="color: var(--text-secondary); width: auto; height: auto;"><i class="fa-solid fa-filter"></i></button>
                    </div>
                    
                    <div class="transaction-list" id="history-transaction-list">
                        <div style="text-align: center; color: var(--text-secondary); padding: 20px;">Loading history...</div>
                    </div>
                </div>
            </div>

            <!-- Global Action Button (FAB) -->
            <button class="fab-btn page-stats history page-history" style="display: none;"><i class="fa-solid fa-plus"></i></button>
        </main>

        <!-- Bottom Navigation for Mobile -->
        <nav class="bottom-nav mobile-only">
            <button class="bottom-nav-item active" data-page="page-chat">
                <i class="fa-regular fa-message"></i>
                <span>CHAT</span>
            </button>
            <button class="bottom-nav-item" data-page="page-stats">
                <i class="fa-solid fa-chart-pie"></i>
                <span>STATS</span>
            </button>
            <button class="bottom-nav-item" data-page="page-history">
                <i class="fa-solid fa-clock-rotate-left"></i>
                <span>HISTORY</span>
            </button>
        </nav>
    </div>
    
    <!-- Template for messages -->
    <template id="message-template">
        <div class="message">
            <div class="avatar"></div>
            <div class="message-content">
                <div class="message-text"></div>
            </div>
        </div>
    </template>

    <script src="script.js"></script>
</body>
</html>
